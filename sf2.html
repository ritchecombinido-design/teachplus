<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF2 – Daily Attendance | TeachPlus</title>
<script src="dexie.js"></script>
<link rel="stylesheet" href="fontawesome/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx-populate/browser/xlsx-populate.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="styles.css">
<style>
/* ── SF2 EXTENDED STYLES ── */
:root {
  --sf2-header-h: 64px;
}

.sf2-layout {
display: flex;
min-height: 100vh;
background: var(--bg);
position: relative;
z-index: 2;
}

/* ── TOPBAR ── */
.sf2-topbar {
height: var(--sf2-header-h);
background: var(--surface);
border-bottom: 1px solid var(--border);
display: flex;
align-items: center;
padding: 0 24px;
gap: 14px;
position: sticky;
top: 0;
z-index: 100;
box-shadow: 0 1px 6px rgba(0,0,0,.06);
}

.sf2-back-btn {
display: flex;
align-items: center;
gap: 8px;
background: var(--surface2);
border: 1px solid var(--border);
border-radius: 10px;
padding: 8px 14px;
cursor: pointer;
color: var(--text2);
font-size: .82rem;
font-weight: 600;
transition: all .2s;
font-family: var(--font);
}
.sf2-back-btn:hover { background: var(--border); color: var(--text); }

.sf2-topbar-title {
font-family: var(--font-display);
font-size: 1.1rem;
color: var(--text);
flex: 1;
}
.sf2-topbar-title span { color: var(--accent); }

.sf2-topbar-actions { display: flex; align-items: center; gap: 10px; }

/* ── MAIN LAYOUT ── */
.sf2-main {
flex: 1;
display: flex;
flex-direction: column;
min-height: 0;
}

.sf2-content {
flex: 1;
padding: 28px;
max-width: 1500px;
width: 100%;
margin: 0 auto;
}

/* ── FILTER BAR ── */
.sf2-filter-bar {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 16px;
padding: 20px 24px;
display: flex;
flex-wrap: wrap;
gap: 14px;
align-items: flex-end;
margin-bottom: 24px;
box-shadow: var(--card-shadow);
}

.sf2-filter-group {
display: flex;
flex-direction: column;
gap: 6px;
}

.sf2-filter-group label {
font-size: .72rem;
font-weight: 600;
color: var(--text3);
text-transform: uppercase;
letter-spacing: .07em;
}

.sf2-select, .sf2-input {
background: var(--surface2);
border: 1px solid var(--border);
border-radius: 10px;
padding: 9px 13px;
color: var(--text);
font-family: var(--font);
font-size: .85rem;
min-width: 140px;
transition: border-color .2s;
outline: none;
}
.sf2-select:focus, .sf2-input:focus { border-color: var(--accent); }

.sf2-load-btn {
background: var(--accent);
color: #fff;
border: none;
border-radius: 10px;
padding: 9px 20px;
font-family: var(--font);
font-size: .85rem;
font-weight: 600;
cursor: pointer;
display: flex;
align-items: center;
gap: 8px;
transition: opacity .2s, transform .2s;
white-space: nowrap;
}
.sf2-load-btn:hover { opacity: .88; transform: translateY(-1px); }

/* ── STAT CARDS ── */
.sf2-stats-row {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
gap: 14px;
margin-bottom: 24px;
}

.sf2-stat {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 14px;
padding: 18px 16px;
box-shadow: var(--card-shadow);
display: flex;
flex-direction: column;
gap: 6px;
position: relative;
overflow: hidden;
}

.sf2-stat::before {
content: '';
position: absolute;
top: 0; left: 0; right: 0;
height: 3px;
background: var(--stat-color, var(--accent));
}

.sf2-stat-icon {
width: 34px; height: 34px;
border-radius: 8px;
display: flex; align-items: center; justify-content: center;
font-size: 15px;
background: var(--stat-bg, rgba(37,99,235,.1));
color: var(--stat-color, var(--accent));
margin-bottom: 2px;
}

.sf2-stat-val {
font-size: 1.6rem;
font-weight: 700;
color: var(--text);
line-height: 1;
}

.sf2-stat-label {
font-size: .72rem;
color: var(--text3);
font-weight: 500;
}

/* ── CHARTS SECTION ── */
.sf2-charts-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
margin-bottom: 24px;
}

.sf2-chart-card {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 16px;
padding: 22px;
box-shadow: var(--card-shadow);
}

.sf2-chart-title {
font-size: .88rem;
font-weight: 700;
color: var(--text);
margin-bottom: 16px;
display: flex;
align-items: center;
gap: 8px;
}

.sf2-chart-title i { color: var(--accent); }

.sf2-chart-wrap {
position: relative;
height: 220px;
}

/* ── TABLE SECTION ── */
.sf2-table-card {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 16px;
padding: 22px;
box-shadow: var(--card-shadow);
margin-bottom: 24px;
overflow-x: auto;
}

.sf2-section-heading {
font-size: .88rem;
font-weight: 700;
color: var(--text);
margin-bottom: 16px;
display: flex;
align-items: center;
gap: 8px;
padding-bottom: 12px;
border-bottom: 1px solid var(--border);
}

.sf2-section-heading i { color: var(--accent); }

.sf2-table {
width: 100%;
border-collapse: collapse;
font-size: .8rem;
}

.sf2-table th {
background: var(--surface2);
padding: 10px 12px;
text-align: left;
font-weight: 700;
font-size: .72rem;
color: var(--text2);
text-transform: uppercase;
letter-spacing: .06em;
position: sticky;
top: 0;
}

.sf2-table td {
padding: 9px 12px;
border-bottom: 1px solid var(--border);
color: var(--text);
vertical-align: middle;
}

.sf2-table tr:last-child td { border-bottom: none; }
.sf2-table tr:hover td { background: var(--surface2); }

.sf2-badge {
display: inline-flex;
align-items: center;
gap: 4px;
padding: 3px 9px;
border-radius: 20px;
font-size: .7rem;
font-weight: 600;
}

.badge-present { background: rgba(13,148,136,.12); color: var(--green); }
.badge-absent  { background: rgba(225,29,72,.12);  color: var(--rose);  }
.badge-late    { background: rgba(217,119,6,.12);  color: var(--amber); }
.badge-cutting { background: rgba(124,58,237,.12); color: var(--purple);}
.badge-male    { background: rgba(37,99,235,.1);   color: var(--accent);}
.badge-female  { background: rgba(225,29,72,.08);  color: #db2777; }

/* attendance indicator */
.att-dot {
width: 10px; height: 10px;
border-radius: 50%;
display: inline-block;
}
.att-dot.present { background: var(--green); }
.att-dot.absent  { background: var(--rose); }
.att-dot.late    { background: var(--amber); }
.att-dot.cutting { background: var(--purple); }

/* ── PROGRESS BAR ── */
.sf2-progress-bar {
height: 6px;
background: var(--surface2);
border-radius: 3px;
overflow: hidden;
margin-top: 4px;
}
.sf2-progress-fill {
height: 100%;
border-radius: 3px;
background: var(--accent);
transition: width .5s ease;
}
.sf2-progress-fill.green { background: var(--green); }
.sf2-progress-fill.amber { background: var(--amber); }
.sf2-progress-fill.rose  { background: var(--rose);  }

/* ── RISK TABLE ── */
.sf2-risk-badge {
padding: 2px 10px;
border-radius: 20px;
font-size: .7rem;
font-weight: 700;
}
.risk-high    { background: rgba(225,29,72,.12);  color: var(--rose);  }
.risk-medium  { background: rgba(217,119,6,.12);  color: var(--amber); }
.risk-low     { background: rgba(13,148,136,.12); color: var(--green); }

/* ── EXPORT SECTION ── */
.sf2-export-bar {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 16px;
padding: 20px 24px;
display: flex;
flex-wrap: wrap;
gap: 12px;
align-items: center;
margin-bottom: 24px;
box-shadow: var(--card-shadow);
}

.sf2-export-info {
flex: 1;
min-width: 220px;
}

.sf2-export-info h3 {
font-size: .95rem;
font-weight: 700;
color: var(--text);
margin-bottom: 3px;
}

.sf2-export-info p {
font-size: .78rem;
color: var(--text3);
}

.sf2-export-btn {
display: flex;
align-items: center;
gap: 8px;
padding: 10px 20px;
border-radius: 10px;
border: none;
font-family: var(--font);
font-size: .85rem;
font-weight: 600;
cursor: pointer;
transition: all .2s;
}

.sf2-export-btn.primary {
background: var(--accent);
color: #fff;
}
.sf2-export-btn.primary:hover { opacity: .88; transform: translateY(-1px); }

.sf2-export-btn.secondary {
background: var(--surface2);
border: 1px solid var(--border);
color: var(--text);
}
.sf2-export-btn.secondary:hover { background: var(--border); }

.sf2-export-btn.pdf-btn {
background: rgba(225,29,72,.1);
border: 1px solid rgba(225,29,72,.2);
color: var(--rose);
}
.sf2-export-btn.pdf-btn:hover { background: rgba(225,29,72,.18); }

.sf2-ready-badge {
display: inline-flex;
align-items: center;
gap: 6px;
background: rgba(13,148,136,.1);
border: 1px solid rgba(13,148,136,.2);
color: var(--green);
padding: 6px 14px;
border-radius: 20px;
font-size: .8rem;
font-weight: 600;
}

/* ── EMPTY STATE ── */
.sf2-empty {
text-align: center;
padding: 64px 24px;
color: var(--text3);
}
.sf2-empty i { font-size: 3rem; margin-bottom: 16px; display: block; opacity: .4; }
.sf2-empty h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; color: var(--text2); }
.sf2-empty p { font-size: .85rem; }

/* ── TOAST ── */
.sf2-toast-container {
position: fixed;
bottom: 28px;
right: 28px;
z-index: 9999;
display: flex;
flex-direction: column;
gap: 10px;
pointer-events: none;
}

.sf2-toast {
background: var(--text);
color: var(--surface);
padding: 13px 18px;
border-radius: 12px;
font-size: .84rem;
font-weight: 500;
display: flex;
align-items: center;
gap: 10px;
box-shadow: 0 6px 24px rgba(0,0,0,.25);
animation: sfSlideUp .3s ease;
pointer-events: auto;
max-width: 340px;
}
.sf2-toast.success { border-left: 3px solid var(--green); }
.sf2-toast.error   { border-left: 3px solid var(--rose); }
.sf2-toast.info    { border-left: 3px solid var(--accent); }
.sf2-toast.out { opacity: 0; transition: opacity .3s; }

@keyframes sfSlideUp {
from { transform: translateY(20px); opacity: 0; }
to { transform: none; opacity: 1; }
}

/* ── CONSECUTIVE ABSENT TABLE ── */
.sf2-consec-table {
width: 100%;
border-collapse: collapse;
font-size: .8rem;
}
.sf2-consec-table th {
background: rgba(225,29,72,.07);
padding: 9px 12px;
text-align: left;
font-weight: 700;
font-size: .72rem;
color: var(--rose);
text-transform: uppercase;
letter-spacing: .06em;
}
.sf2-consec-table td {
padding: 8px 12px;
border-bottom: 1px solid var(--border);
color: var(--text);
}
.sf2-consec-table tr:last-child td { border-bottom: none; }

/* ── SUMMARY GRID ── */
.sf2-summary-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 14px;
margin-bottom: 24px;
}

.sf2-summary-card {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 14px;
padding: 18px;
box-shadow: var(--card-shadow);
}

.sf2-summary-card h4 {
font-size: .78rem;
font-weight: 700;
color: var(--text3);
text-transform: uppercase;
letter-spacing: .07em;
margin-bottom: 12px;
display: flex;
align-items: center;
gap: 7px;
}

.sf2-summary-row {
display: flex;
justify-content: space-between;
align-items: center;
padding: 6px 0;
border-bottom: 1px solid var(--border);
font-size: .82rem;
}

.sf2-summary-row:last-child { border-bottom: none; }
.sf2-summary-row .label { color: var(--text2); }
.sf2-summary-row .value { font-weight: 700; color: var(--text); }
.sf2-summary-row .pct { font-size: .7rem; color: var(--text3); }

/* ── LOADING SPINNER ── */
.sf2-loading {
display: flex;
align-items: center;
justify-content: center;
gap: 12px;
padding: 48px;
color: var(--text3);
font-size: .88rem;
}
.sf2-spinner {
width: 24px; height: 24px;
border: 3px solid var(--border);
border-top-color: var(--accent);
border-radius: 50%;
animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── WEEKLY HEATMAP ── */
.heatmap-wrap { overflow-x: auto; }
.heatmap-grid {
display: grid;
grid-auto-columns: 1fr;
grid-auto-flow: column;
gap: 4px;
min-width: 600px;
}
.heatmap-col { display: flex; flex-direction: column; gap: 4px; }
.heatmap-label {
font-size: .67rem;
color: var(--text3);
text-align: center;
padding-bottom: 2px;
font-weight: 600;
text-transform: uppercase;
}
.heatmap-cell {
height: 28px;
border-radius: 5px;
display: flex;
align-items: center;
justify-content: center;
font-size: .67rem;
font-weight: 700;
color: #fff;
transition: transform .15s;
cursor: default;
}
.heatmap-cell:hover { transform: scale(1.08); }

/* ── RESPONSIVE ── */
@media (max-width: 1100px) {
.sf2-charts-grid { grid-template-columns: 1fr; }
.sf2-summary-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 768px) {
.sf2-content { padding: 16px; }
.sf2-stats-row { grid-template-columns: repeat(2, 1fr); }
.sf2-summary-grid { grid-template-columns: 1fr; }
.sf2-filter-bar { flex-direction: column; align-items: stretch; }
.sf2-select, .sf2-input { min-width: unset; width: 100%; }
}
</style>

</head>

<div id="themeBackground" aria-hidden="true">

<script>
/* ============================================================
   DEXIE DB
   ============================================================ */
const db = new Dexie('TeachPlusDB');
db.version(2).stores({
  settings:     '&key, value',
  quotes:       '++id, quoteIndex, shownAt',
  activityLogs: '++id, message, icon, color, ts',
  cacheData:    '&cacheKey, data, updatedAt',
  schoolMeta:   '&key, value',
  sections:     '++id, gradeLevel, sectionName',
  learners:     '++id, lrn, fullname, sex, gradeLevel, section',
  attendance:   '++id, learnerId, date, section, status, month',
  interventions:'++id, learnerId, section, message, createdAt, updatedAt',
  themeState:   '&key, value'
});

/* ============================================================
   THEME SYNC
   ============================================================ */
async function loadTheme() {
  try {
    let row = await db.themeState.get('active');
    if (!row || !row.value) {
      row = await db.settings.get('theme');
    }
    const theme = (row && row.value) ? row.value : (localStorage.getItem('tp_theme') || 'light');
    document.documentElement.setAttribute('data-theme', theme);
  } catch(e) {
    const ls = localStorage.getItem('tp_theme') || 'light';
    document.documentElement.setAttribute('data-theme', ls);
  }
}

window.addEventListener('storage', e => {
  if (e.key === 'tp_theme' && e.newValue) {
    document.documentElement.setAttribute('data-theme', e.newValue);
  }
});

setInterval(async () => {
  try {
    let row = await db.themeState.get('active');
    if (!row) row = await db.settings.get('theme');
    const t = row?.value || 'light';
    const cur = document.documentElement.getAttribute('data-theme');
    if (t !== cur) document.documentElement.setAttribute('data-theme', t);
  } catch(e) {}
}, 3000);

/* ============================================================
   TOAST
   ============================================================ */
function toast(msg, type = 'info', icon = 'fa-info-circle') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `sf2-toast ${type}`;
  t.innerHTML = `<i class="fas ${icon}"></i><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 350); }, 3500);
}

/* ============================================================
   LOAD GRADES & SECTIONS
   ============================================================ */
async function loadGrades() {
  const grades = [...new Set((await db.sections.toArray()).map(s => s.gradeLevel))].sort();
  const sel = document.getElementById('sf2-grade');
  sel.innerHTML = '<option value="">Select Grade</option>' + grades.map(g => `<option value="${g}">Grade ${g}</option>`).join('');
}

async function updateSF2Sections() {
  const grade = document.getElementById('sf2-grade').value;
  const secs = grade
    ? (await db.sections.where('gradeLevel').equals(grade).toArray()).map(s => s.sectionName)
    : [];
  const sel = document.getElementById('sf2-section');
  sel.innerHTML = '<option value="">Select Section</option>' + secs.map(s => `<option value="${s}">${s}</option>`).join('');
}

/* ============================================================
   HELPER UTILITIES
   ============================================================ */
const MONTHS = ['','January','February','March','April','May','June','July','August','September','October','November','December'];

function getMonthDays(year, month) {
  return new Date(year, month, 0).getDate();
}

function isWeekend(year, month, day) {
  const d = new Date(year, month - 1, day).getDay();
  return d === 0 || d === 6;
}

function getSchoolDays(year, month) {
  const days = [];
  const total = getMonthDays(year, month);
  for (let d = 1; d <= total; d++) {
    if (!isWeekend(year, month, d)) days.push(d);
  }
  return days;
}

function padDate(y, m, d) {
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function getDOW(year, month, day) {
  return new Date(year, month - 1, day).getDay(); // 0=Sun..6=Sat
}

function rateColor(pct) {
  if (pct >= 90) return '#0d9488';
  if (pct >= 75) return '#d97706';
  return '#e11d48';
}

function rateClass(pct) {
  if (pct >= 90) return 'risk-low';
  if (pct >= 75) return 'risk-medium';
  return 'risk-high';
}

function riskLabel(pct) {
  if (pct >= 90) return 'Good';
  if (pct >= 75) return 'At Risk';
  return 'Critical';
}

/* ============================================================
   MAIN DATA LOADER
   ============================================================ */
let currentSF2 = null;

async function loadSF2Data() {
  const grade   = document.getElementById('sf2-grade').value;
  const section = document.getElementById('sf2-section').value;
  const month   = parseInt(document.getElementById('sf2-month').value);
  const syVal   = document.getElementById('sf2-sy').value.trim();

  if (!grade || !section) {
    toast('Please select a grade and section.', 'error', 'fa-exclamation-circle');
    return;
  }
  if (!month) {
    toast('Please select a month.', 'error', 'fa-exclamation-circle');
    return;
  }

  const dyn = document.getElementById('sf2-dynamic');
  dyn.innerHTML = `<div class="sf2-loading"><div class="sf2-spinner"></div> Loading attendance data...</div>`;

  try {
    const metas = {};
    (await db.schoolMeta.toArray()).forEach(m => metas[m.key] = m.value);

    const settingsArr = await db.settings.toArray();
    const settings = {};
    settingsArr.forEach(s => settings[s.key] = s.value);

    const year = new Date().getFullYear();
    const schoolYear = syVal || metas.schoolYear || `${year}-${year+1}`;
    const schoolName = metas.schoolName || 'N/A';
    const schoolId   = metas.schoolId   || 'N/A';

    const firstname  = settings.firstname  || '';
    const middlename = settings.middlename || '';
    const surname    = settings.surname    || '';
    const teacherName = `${firstname} ${middlename} ${surname}`.replace(/\s+/,' ').trim() || 'N/A';
    const principal  = settings.principal  || 'N/A';

    const allLearners = await db.learners.toArray();
    const sectionLearners = allLearners.filter(l => l.gradeLevel === grade && l.section === section);

    const males   = sectionLearners.filter(l => l.sex === 'M').sort((a,b) => a.fullname.localeCompare(b.fullname));
    const females = sectionLearners.filter(l => l.sex === 'F').sort((a,b) => a.fullname.localeCompare(b.fullname));

    const allAtt = await db.attendance.where('section').equals(section).toArray();
    const monthAtt = allAtt.filter(a => {
      const d = new Date(a.date);
      return d.getMonth() + 1 === month;
    });

    const attMap = {};
    monthAtt.forEach(a => {
      attMap[`${a.learnerId}_${a.date}`] = (a.status || 'present').toLowerCase();
    });

    const schoolDays = getSchoolDays(year, month);

    function learnerStats(learner) {
      const dates = schoolDays.map(d => padDate(year, month, d));
      let present = 0, absent = 0, late = 0, cutting = 0;
      const dayStatuses = {};
      dates.forEach(dt => {
        const key = `${learner.id}_${dt}`;
        const st = attMap[key] || 'present';
        dayStatuses[dt] = st;
        if (st === 'present') present++;
        else if (st === 'absent') absent++;
        else if (st === 'late') late++;
        else if (st === 'cutting') cutting++;
      });
      return { present, absent, late, cutting, dayStatuses };
    }

    function maxConsecAbsent(learner) {
      let max = 0, cur = 0;
      schoolDays.forEach(d => {
        const dt = padDate(year, month, d);
        const st = attMap[`${learner.id}_${dt}`] || 'present';
        if (st === 'absent') { cur++; max = Math.max(max, cur); }
        else cur = 0;
      });
      return max;
    }

    function dayTotals(group) {
      const totals = {};
      schoolDays.forEach(d => {
        const dt = padDate(year, month, d);
        let p = 0;
        group.forEach(l => {
          const st = attMap[`${l.id}_${dt}`] || 'present';
          if (st === 'present') p++;
        });
        totals[dt] = p;
      });
      return totals;
    }

    const maleDayTotals   = dayTotals(males);
    const femaleDayTotals = dayTotals(females);

    const maleStats   = males.map(l => ({ ...l, ...learnerStats(l), consec: maxConsecAbsent(l) }));
    const femaleStats = females.map(l => ({ ...l, ...learnerStats(l), consec: maxConsecAbsent(l) }));
    const allStats    = [...maleStats, ...femaleStats];

    const totalMale   = males.length;
    const totalFemale = females.length;
    const totalAll    = totalMale + totalFemale;

    const totalMalePresent   = maleStats.reduce((s,l) => s + l.present, 0);
    const totalMaleAbsent    = maleStats.reduce((s,l) => s + l.absent, 0);
    const totalFemalePresent = femaleStats.reduce((s,l) => s + l.present, 0);
    const totalFemaleAbsent  = femaleStats.reduce((s,l) => s + l.absent, 0);
    const totalPresent = totalMalePresent + totalFemalePresent;
    const totalAbsent  = totalMaleAbsent  + totalFemaleAbsent;
    const totalLate    = allStats.reduce((s,l) => s + l.late, 0);
    const totalCutting = allStats.reduce((s,l) => s + l.cutting, 0);

    const schoolDayCount = schoolDays.length;
    const ada  = schoolDayCount > 0 ? (totalMalePresent + totalFemalePresent) / (totalAll * schoolDayCount) * 100 : 0;
    const adaM = (totalMale > 0 && schoolDayCount > 0) ? totalMalePresent   / (totalMale   * schoolDayCount) * 100 : 0;
    const adaF = (totalFemale > 0 && schoolDayCount > 0) ? totalFemalePresent / (totalFemale * schoolDayCount) * 100 : 0;

    const maleConsec5   = maleStats.filter(l => l.consec >= 5).length;
    const femaleConsec5 = femaleStats.filter(l => l.consec >= 5).length;
    const totalConsec5  = maleConsec5 + femaleConsec5;

    currentSF2 = {
      grade, section, month, schoolYear, schoolName, schoolId,
      teacherName, principal,
      males: maleStats, females: femaleStats,
      schoolDays, year,
      maleDayTotals, femaleDayTotals,
      totalMale, totalFemale, totalAll,
      totalMalePresent, totalMaleAbsent,
      totalFemalePresent, totalFemaleAbsent,
      totalPresent, totalAbsent, totalLate, totalCutting,
      ada, adaM, adaF,
      maleConsec5, femaleConsec5, totalConsec5,
      attMap
    };

    renderSF2(currentSF2);

    document.getElementById('exportXlsxBtn').style.display = 'flex';
    document.getElementById('exportPdfBtn').style.display = 'flex';
    document.getElementById('exportReadyBadge').style.display = 'flex';

  } catch(e) {
    console.error(e);
    dyn.innerHTML = `<div class="sf2-empty"><i class="fas fa-exclamation-triangle"></i><h3>Error loading data</h3><p>${e.message}</p></div>`;
    toast('Error loading data: ' + e.message, 'error', 'fa-exclamation-circle');
  }
}

/* ── LEARNER TABLE ── */
function renderLearnerTable(learners, schoolDays, year, month, attMap, totalAll, nameColor) {
  if (!learners.length) return `<p style="color:var(--text3);font-size:.82rem;padding:12px;">No learners found.</p>`;

  const visibleDays = schoolDays.slice(0, 20);

  return `
    <div style="overflow-x:auto;">
    <table class="sf2-table">
      <thead>
        <tr>
          <th>#</th>
          <th style="min-width:180px">Learner Name</th>
          ${visibleDays.map(d => `<th style="text-align:center;min-width:36px;">${d}</th>`).join('')}
          ${schoolDays.length > 20 ? `<th style="text-align:center">+${schoolDays.length-20} more</th>` : ''}
          <th style="text-align:center">Present</th>
          <th style="text-align:center">Absent</th>
          <th style="text-align:center">Late</th>
          <th style="text-align:center">Rate</th>
          <th style="text-align:center">Risk</th>
        </tr>
      </thead>
      <tbody>
        ${learners.map((l, i) => {
          const days = schoolDays.length;
          const pct = days > 0 ? (l.present / days * 100).toFixed(0) : 0;
          return `<tr>
            <td style="color:var(--text3);font-size:.75rem;">${i+1}</td>
            <td style="font-weight:600;color:${nameColor||'var(--text)'};">${l.fullname}</td>
            ${visibleDays.map(d => {
              const dt = padDate(year, month, d);
              const st = attMap[`${l.id}_${dt}`] || 'present';
              const icons = { present:'✓', absent:'✗', late:'▲', cutting:'▽' };
              const colors = { present:'var(--green)', absent:'var(--rose)', late:'var(--amber)', cutting:'var(--purple)' };
              return `<td style="text-align:center;color:${colors[st]||'var(--green)'};font-weight:700;font-size:.78rem;" title="${dt}: ${st}">${icons[st]||'✓'}</td>`;
            }).join('')}
            ${schoolDays.length > 20 ? `<td style="text-align:center;color:var(--text3);font-size:.75rem;">…</td>` : ''}
            <td style="text-align:center;color:var(--green);font-weight:700;">${l.present}</td>
            <td style="text-align:center;color:var(--rose);font-weight:700;">${l.absent}</td>
            <td style="text-align:center;color:var(--amber);font-weight:700;">${l.late}</td>
            <td style="text-align:center;">
              <span class="sf2-risk-badge ${rateClass(parseFloat(pct))}">${pct}%</span>
            </td>
            <td style="text-align:center;">
              <span class="sf2-risk-badge ${rateClass(parseFloat(pct))}">${riskLabel(parseFloat(pct))}</span>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
      <tfoot>
        <tr style="background:var(--surface2);font-weight:700;">
          <td colspan="2" style="font-weight:700;">TOTAL</td>
          ${visibleDays.map(d => {
            const dt = padDate(year, month, d);
            const cnt = learners.filter(l => (attMap[`${l.id}_${dt}`] || 'present') === 'present').length;
            return `<td style="text-align:center;font-size:.75rem;">${cnt}</td>`;
          }).join('')}
          ${schoolDays.length > 20 ? '<td></td>' : ''}
          <td style="text-align:center;color:var(--green);">${learners.reduce((s,l)=>s+l.present,0)}</td>
          <td style="text-align:center;color:var(--rose);">${learners.reduce((s,l)=>s+l.absent,0)}</td>
          <td style="text-align:center;color:var(--amber);">${learners.reduce((s,l)=>s+l.late,0)}</td>
          <td colspan="2"></td>
        </tr>
      </tfoot>
    </table>
    </div>`;
}

        <tr>
          <td style="font-weight:600;color:#3b82f6;"><i class="fas fa-mars"></i> Male Present</td>
          ${days.map(day => {
            const dt = padDate(d.year, d.month, day);
            return `<td style="text-align:center;font-weight:600;">${d.maleDayTotals[dt]||0}</td>`;
          }).join('')}
          ${d.schoolDays.length > 20 ? '<td>…</td>' : ''}
          <td style="text-align:center;font-weight:700;color:#3b82f6;">${d.totalMalePresent}</td>
        </tr>
        <tr>
          <td style="font-weight:600;color:#db2777;"><i class="fas fa-venus"></i> Female Present</td>
          ${days.map(day => {
            const dt = padDate(d.year, d.month, day);
            return `<td style="text-align:center;font-weight:600;">${d.femaleDayTotals[dt]||0}</td>`;
          }).join('')}
          ${d.schoolDays.length > 20 ? '<td>…</td>' : ''}
          <td style="text-align:center;font-weight:700;color:#db2777;">${d.totalFemalePresent}</td>
        </tr>
        <tr style="background:var(--surface2);">
          <td style="font-weight:700;"><i class="fas fa-users"></i> Total Present</td>
          ${days.map(day => {
            const dt = padDate(d.year, d.month, day);
            const t = (d.maleDayTotals[dt]||0) + (d.femaleDayTotals[dt]||0);
            return `<td style="text-align:center;font-weight:700;">${t}</td>`;
          }).join('')}
          ${d.schoolDays.length > 20 ? '<td>…</td>' : ''}
          <td style="text-align:center;font-weight:700;">${d.totalPresent}</td>
        </tr>
      </tbody>
    </table>
    </div>`;
}

/* ============================================================
   CHARTS
   ============================================================ */
let charts = {};

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

function chartColors() {
  const theme = document.documentElement.getAttribute('data-theme') || 'light';
  const gridColor = theme === 'dark' ? 'rgba(255,255,255,.07)' : 'rgba(0,0,0,.06)';
  const textColor = theme === 'dark' ? '#8b9ab0' : '#8aa0b8';
  return { gridColor, textColor };
}

function renderChartDaily(d) {
  destroyChart('daily');
  const ctx = document.getElementById('chartDaily');
  if (!ctx) return;
  const { gridColor, textColor } = chartColors();
  const labels = d.schoolDays.map(day => `${MONTHS[d.month].slice(0,3)} ${day}`);
  const presentPerDay = d.schoolDays.map(day => {
    const dt = padDate(d.year, d.month, day);
    return (d.maleDayTotals[dt]||0) + (d.femaleDayTotals[dt]||0);
  });
  charts['daily'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Present',
        data: presentPerDay,
        backgroundColor: 'rgba(37,99,235,.7)',
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: textColor, font: { size: 10 } }, grid: { color: gridColor } },
        y: { ticks: { color: textColor }, grid: { color: gridColor }, beginAtZero: true, max: d.totalAll }
      }
    }
  });
}

function renderChartPie(d) {
  destroyChart('pie');
  const ctx = document.getElementById('chartPie');
  if (!ctx) return;
  charts['pie'] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Present', 'Absent', 'Late', 'Cutting'],
      datasets: [{
        data: [d.totalPresent, d.totalAbsent, d.totalLate, d.totalCutting],
        backgroundColor: ['#0d9488','#e11d48','#d97706','#7c3aed'],
        borderWidth: 0
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '60%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: { padding: 14, font: { size: 11 }, color: chartColors().textColor }
        }
      }
    }
  });
}

function renderChartGender(d) {
  destroyChart('gender');
  const ctx = document.getElementById('chartGender');
  if (!ctx) return;
  const { gridColor, textColor } = chartColors();
  const labels = d.schoolDays.map(day => day.toString());
  const maleData   = d.schoolDays.map(day => d.maleDayTotals[padDate(d.year, d.month, day)]   || 0);
  const femaleData = d.schoolDays.map(day => d.femaleDayTotals[padDate(d.year, d.month, day)] || 0);
  charts['gender'] = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Male', data: maleData, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,.12)', tension: .3, fill: true, pointRadius: 3 },
        { label: 'Female', data: femaleData, borderColor: '#db2777', backgroundColor: 'rgba(219,39,119,.08)', tension: .3, fill: true, pointRadius: 3 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: textColor, font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: textColor, font: { size: 10 } }, grid: { color: gridColor } },
        y: { ticks: { color: textColor }, grid: { color: gridColor }, beginAtZero: true }
      }
    }
  });
}

function renderHeatmap(d) {
  const wrap = document.getElementById('heatmapWrap');
  if (!wrap) return;

  const weeks = [];
  let currentWeek = [];
  const dayNames = ['Mon','Tue','Wed','Thu','Fri'];

  d.schoolDays.forEach(day => {
    const dow = getDOW(d.year, d.month, day);
    if (dow === 1 && currentWeek.length > 0) { weeks.push(currentWeek); currentWeek = []; }
    currentWeek.push(day);
  });
  if (currentWeek.length) weeks.push(currentWeek);

  const maxPresent = d.totalAll || 1;

  let html = `<div class="heatmap-grid" style="grid-template-columns:repeat(${weeks.length},1fr)">`;
  weeks.forEach((week, wi) => {
    html += `<div class="heatmap-col">
      <div class="heatmap-label">Wk ${wi+1}</div>`;
    week.forEach(day => {
      const dt = padDate(d.year, d.month, day);
      const p = (d.maleDayTotals[dt]||0) + (d.femaleDayTotals[dt]||0);
      const pct = maxPresent > 0 ? p/maxPresent : 0;
      const bg = pct >= .9 ? '#0d9488' : pct >= .75 ? '#d97706' : pct >= .5 ? '#e11d48' : '#991b1b';
      const opacity = 0.4 + pct * 0.6;
      html += `<div class="heatmap-cell" style="background:${bg};opacity:${opacity}" title="${dt}: ${p}/${d.totalAll} present (${Math.round(pct*100)}%)">
        ${p}
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;
  wrap.innerHTML = html;
}

/* ============================================================
   XLSX EXPORT – SF2 MAPPING (xlsx-populate — true template preservation)
   ============================================================ */
async function exportToXLSX() {
  if (!currentSF2) { toast('Please load data first.', 'error', 'fa-exclamation-circle'); return; }

  if (typeof XlsxPopulate === 'undefined') {
    toast('xlsx-populate not loaded. Check your internet connection.', 'error', 'fa-exclamation-circle');
    return;
  }

  toast('Loading template & building SF2...', 'info', 'fa-cog fa-spin');

  const d = currentSF2;

  // ── Week→column mapping ──
  const weekDayMap = [
    { mon:'F',  tue:'H',  wed:'I',  thu:'J',  fri:'K'  }, // Week 1
    { mon:'L',  tue:'N',  wed:'O',  thu:'P',  fri:'Q'  }, // Week 2
    { mon:'R',  tue:'T',  wed:'U',  thu:'V',  fri:'X'  }, // Week 3
    { mon:'Z',  tue:'AB', wed:'AC', thu:'AD', fri:'AE' }, // Week 4
    { mon:'AF', tue:'AG', wed:'AI', thu:'AJ', fri:'AK' }, // Week 5
  ];

  const DOW_TO_KEY = { 1:'mon', 2:'tue', 3:'wed', 4:'thu', 5:'fri' };

  function getDayMapping(schoolDays) {
    const map = {};
    let weekIndex = 0;
    let lastDOW = -1;
    schoolDays.forEach(day => {
      const dow = getDOW(d.year, d.month, day);
      if (dow === 1 && lastDOW !== -1 && weekIndex < 4) weekIndex++;
      lastDOW = dow;
      const key = DOW_TO_KEY[dow];
      const wMap = weekDayMap[Math.min(weekIndex, 4)];
      if (key && wMap) {
        map[day] = wMap[key];
      }
    });
    return map;
  }

  const dayColMap = getDayMapping(d.schoolDays);

  try {
    // ── Load template via fetch → ArrayBuffer → xlsx-populate ──
    let workbook;
    try {
      const resp = await fetch('sf2_template.xlsx');
      if (!resp.ok) throw new Error('Template not found');
      const ab = await resp.arrayBuffer();
      workbook = await XlsxPopulate.fromDataAsync(ab);
      toast('Template loaded ✓ Writing data...', 'info', 'fa-file-excel');
    } catch(e) {
      toast('sf2_template.xlsx not found — exporting data-only file.', 'info', 'fa-info-circle');
      workbook = await XlsxPopulate.fromBlankAsync();
    }

    const ws = workbook.sheet(0);

    // ── Helper: write value only — style is NEVER touched ──
    function setCell(colLetter, rowNum, value) {
      ws.cell(`${colLetter}${rowNum}`).value(value);
    }

    // ── HEADER INFO ──
    setCell('F',  3, d.schoolId);
    setCell('M',  3, d.schoolYear);
    setCell('AA', 3, MONTHS[d.month]);
    setCell('F',  4, d.schoolName);
    setCell('AA', 4, `Grade ${d.grade}`);
    setCell('AM', 4, d.section);

    // ── DATE ROW 6 — write day numbers ──
    d.schoolDays.forEach(day => {
      const col = dayColMap[day];
      if (col) setCell(col, 6, day);
    });

    // ── MALE LEARNERS — rows 8 to 107 ──
    d.males.forEach((l, i) => {
      const row = 8 + i;
      setCell('C', row, l.fullname);
      setCell('AM', row, l.absent);
      setCell('AO', row, l.present);

      d.schoolDays.forEach(day => {
        const col = dayColMap[day];
        if (!col) return;
        const dt = padDate(d.year, d.month, day);
        const st = d.attMap[`${l.id}_${dt}`] || 'present';
        if (st === 'absent')       setCell(col, row, 'X');
        else if (st === 'late')    setCell(col, row, '/');
        else if (st === 'cutting') setCell(col, row, '\\');
        // present stays blank — don't overwrite template cell
      });
    });

    // ── ROW 108 — Male daily present totals ──
    d.schoolDays.forEach(day => {
      const col = dayColMap[day];
      if (!col) return;
      const dt = padDate(d.year, d.month, day);
      setCell(col, 108, d.maleDayTotals[dt] || 0);
    });
    setCell('AM', 108, d.totalMaleAbsent);
    setCell('AO', 108, d.totalMalePresent);

    // ── FEMALE LEARNERS — rows 109 to 208 ──
    d.females.forEach((l, i) => {
      const row = 109 + i;
      setCell('C', row, l.fullname);
      setCell('AM', row, l.absent);
      setCell('AO', row, l.present);

      d.schoolDays.forEach(day => {
        const col = dayColMap[day];
        if (!col) return;
        const dt = padDate(d.year, d.month, day);
        const st = d.attMap[`${l.id}_${dt}`] || 'present';
        if (st === 'absent')       setCell(col, row, 'X');
        else if (st === 'late')    setCell(col, row, '/');
        else if (st === 'cutting') setCell(col, row, '\\');
      });
    });

    // ── ROW 209 — Female daily present totals ──
    d.schoolDays.forEach(day => {
      const col = dayColMap[day];
      if (!col) return;
      const dt = padDate(d.year, d.month, day);
      setCell(col, 209, d.femaleDayTotals[dt] || 0);
    });
    setCell('AM', 209, d.totalFemaleAbsent);
    setCell('AO', 209, d.totalFemalePresent);

    // ── ROW 210 — Combined M+F daily totals ──
    d.schoolDays.forEach(day => {
      const col = dayColMap[day];
      if (!col) return;
      const dt = padDate(d.year, d.month, day);
      const total = (d.maleDayTotals[dt]||0) + (d.femaleDayTotals[dt]||0);
      setCell(col, 210, total);
    });
    setCell('AM', 210, d.totalAbsent);
    setCell('AO', 210, d.totalPresent);

    // ── ENROLLMENT SUMMARY ──
    setCell('AR', 219, d.totalMale);
    setCell('AR', 213, d.totalMale);
    setCell('AS', 219, d.totalFemale);
    setCell('AS', 213, d.totalFemale);
    setCell('AT', 219, d.totalAll);
    setCell('AT', 213, d.totalAll);

    // ── PERCENTAGE OF ENROLLMENT ──
    const pctEnrM = d.totalMale   > 0 ? 100 : 0;
    const pctEnrF = d.totalFemale > 0 ? 100 : 0;
    const pctEnrT = d.totalAll    > 0 ? 100 : 0;
    setCell('AR', 221, parseFloat(pctEnrM.toFixed(2)));
    setCell('AS', 221, parseFloat(pctEnrF.toFixed(2)));
    setCell('AT', 221, parseFloat(pctEnrT.toFixed(2)));

    // ── AVERAGE DAILY ATTENDANCE ──
    setCell('AR', 223, parseFloat(d.adaM.toFixed(2)));
    setCell('AS', 223, parseFloat(d.adaF.toFixed(2)));
    setCell('AT', 223, parseFloat(d.ada.toFixed(2)));

    // ── PERCENTAGE OF ATTENDANCE FOR THE MONTH ──
    const pctAttM = d.totalMale > 0 && d.schoolDays.length > 0
      ? d.totalMalePresent / (d.totalMale * d.schoolDays.length) * 100 : 0;
    const pctAttF = d.totalFemale > 0 && d.schoolDays.length > 0
      ? d.totalFemalePresent / (d.totalFemale * d.schoolDays.length) * 100 : 0;
    const pctAttT = d.totalAll > 0 && d.schoolDays.length > 0
      ? d.totalPresent / (d.totalAll * d.schoolDays.length) * 100 : 0;
    setCell('AR', 225, parseFloat(pctAttM.toFixed(2)));
    setCell('AS', 225, parseFloat(pctAttF.toFixed(2)));
    setCell('AT', 225, parseFloat(pctAttT.toFixed(2)));

    // ── CONSECUTIVE ABSENCES ≥5 ──
    setCell('AR', 226, d.maleConsec5);
    setCell('AS', 226, d.femaleConsec5);
    setCell('AT', 226, d.totalConsec5);

    // ── TEACHER & PRINCIPAL NAMES ──
    setCell('AN', 236, d.teacherName);
    setCell('AN', 242, d.principal);

    // ── GENERATE & DOWNLOAD ──
    const blob = await workbook.outputAsync('blob');
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `SF2_Grade${d.grade}_${d.section}_${MONTHS[d.month]}_${d.schoolYear}.xlsx`.replace(/\s/g,'_');
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    toast('SF2 exported successfully! 🎉', 'success', 'fa-check-circle');

  } catch(e) {
    console.error(e);
    toast('Export failed: ' + e.message, 'error', 'fa-exclamation-circle');
  }
}

  await loadTheme();

  const now = new Date();
  document.getElementById('sf2-month').value = now.getMonth() + 1;

  try {
    const metas = await db.schoolMeta.toArray();
    const meta = {};
    metas.forEach(m => meta[m.key] = m.value);
    if (meta.schoolYear) document.getElementById('sf2-sy').value = meta.schoolYear;
  } catch(e) {}

  await loadGrades();
}
